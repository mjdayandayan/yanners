<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
    }
    .container {
      padding: 50px;
    }
    h1 {
      font-size: 3em;
    }
    .heart {
      font-size: 2em;
      animation: float 2s infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff6f91;
      cursor: pointer;
    }
    #message {
      display: none;
      margin-top: 20px;
      font-size: 1.5em;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Happy Birthday, [HER NAME]! 🎉</h1>
  <p>You make life brighter just by being in it 💖</p>

  <button onclick="showMessage()">Click for a surprise 🎁</button>

  <div id="message">
    <p>
      Thank you for being such an amazing person.  
      I hope your day is filled with happiness and love 💕  
      You deserve the world!
    </p>
    <div class="heart">💖💖💖</div>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
